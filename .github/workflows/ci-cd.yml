name: Frontend CI/CD
on: {push: {branches: [main]}, pull_request: {branches: [main]}}
permissions: {contents: read, packages: write}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm}
      - run: npm ci
      - run: npm run build
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with: {registry: ghcr.io, username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}'}
      - uses: docker/build-push-action@v6
        if: github.event_name == 'push'
        with: {context: ., push: true, tags: 'ghcr.io/v1dr1k/wherefood-frontend:latest,ghcr.io/v1dr1k/wherefood-frontend:${{ github.sha }}'}
  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with: {host: '${{ secrets.VPS_HOST }}', username: '${{ secrets.VPS_USER }}', key: '${{ secrets.VPS_SSH_KEY }}', script: 'cd /opt/wherefood && docker compose pull frontend && docker compose up -d frontend'}
